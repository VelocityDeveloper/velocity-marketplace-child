name: Auto Release on Version Bump

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - style.css

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          read_theme_version() {
            awk -F ':' '/^[[:space:]]*Version:/ {
              version = $2
              sub(/^[[:space:]]*/, "", version)
              sub(/[[:space:]]*$/, "", version)
              print version
              exit
            }'
          }

          CURRENT_VERSION="$(read_theme_version < style.css)"

          if [[ ! "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid theme version: $CURRENT_VERSION" >&2
            exit 1
          fi

          SHOULD_RELEASE=true

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            PREVIOUS_VERSION=""

            if [[ -n "$BEFORE" && ! "$BEFORE" =~ ^0+$ ]]; then
              PREVIOUS_SOURCE="$(git show "${BEFORE}:style.css" 2>/dev/null || true)"
              PREVIOUS_VERSION="$(printf '%s' "$PREVIOUS_SOURCE" | read_theme_version)"
            fi

            echo "Previous version: ${PREVIOUS_VERSION:-not found}"
            echo "Current version: $CURRENT_VERSION"

            if [[ -n "$PREVIOUS_VERSION" ]]; then
              if [[ "$CURRENT_VERSION" == "$PREVIOUS_VERSION" ]]; then
                SHOULD_RELEASE=false
              elif [[ "$(printf '%s\n%s\n' "$PREVIOUS_VERSION" "$CURRENT_VERSION" | sort -V | tail -n 1)" != "$CURRENT_VERSION" ]]; then
                echo "Version must increase; downgrade from $PREVIOUS_VERSION to $CURRENT_VERSION is not allowed." >&2
                exit 1
              fi
            fi
          fi

          if git rev-parse --quiet --verify "refs/tags/v${CURRENT_VERSION}" >/dev/null; then
            echo "Tag v${CURRENT_VERSION} already exists; skipping release."
            SHOULD_RELEASE=false
          fi

          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        if: steps.version.outputs.should_release == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: git ls-files '*.php' -z | xargs -0 -n 1 php -l

      - name: Build theme ZIP
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          THEME_DIR="build/velocity-marketplace-child"
          ZIP_PATH="dist/velocity-marketplace-child-${VERSION}.zip"

          mkdir -p "$THEME_DIR" dist

          while IFS= read -r -d '' FILE; do
            case "$FILE" in
              .github/*|README.md)
                continue
                ;;
            esac

            mkdir -p "$THEME_DIR/$(dirname "$FILE")"
            cp "$FILE" "$THEME_DIR/$FILE"
          done < <(git ls-files -z)

          (
            cd build
            zip -qr "../${ZIP_PATH}" velocity-marketplace-child
          )

          unzip -t "$ZIP_PATH"

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            "dist/velocity-marketplace-child-${VERSION}.zip" \
            --title "v${VERSION}" \
            --generate-notes
